name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Lint, Typecheck & Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails if convex/_generated is stale — i.e. a Convex module was added
      # without committing `npx convex codegen`. This is the exact drift that
      # broke the Vercel deploy in PR #197; catch it before merge here.
      - name: Convex codegen guard
        run: pnpm check:codegen

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit / Convex tests
        run: pnpm test

  # pnpm audit jobs removed: npm retired `/-/npm/v1/security/audits` (HTTP 410).
  # Re-enable when pnpm supports the bulk advisory endpoint (or pin a working client).
  # Local scripts remain: `pnpm audit:prod` / `pnpm audit:all:gated`.

  contracts:
    name: Foundry (format, build, unit, fuzz, invariant)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-foundry

      - name: Forge fmt
        run: forge fmt --check

      - name: Forge build
        run: forge build

      - name: Forge test (exclude fork)
        run: FOUNDRY_PROFILE=ci forge test --no-match-path 'test/fork/**'

  contracts-static:
    name: Slither static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-foundry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Run Slither directly instead of via crytic/slither-action. The action
      # forced ignore-compile, which made crytic-compile parse Foundry
      # build-info whose newer layout (no top-level "output" key) crashes it
      # with KeyError: 'output'. Letting crytic-compile drive `forge build`
      # with the pinned toolchain (deps already installed by setup-foundry)
      # avoids that.
      - name: Install Slither
        run: pip install "slither-analyzer==0.11.4"

      - name: Run Slither
        working-directory: contracts
        # --fail-high mirrors the action's `fail-on: high`: exit non-zero only
        # on High-severity findings.
        run: slither . --config-file slither.config.json --fail-high

  contracts-fork:
    name: Foundry (Base Sepolia fork)
    runs-on: ubuntu-latest
    # Soft-skips inside the suite when BASE_SEPOLIA_RPC_URL is unset
    # (secrets cannot be compared in job-level `if`).
    defaults:
      run:
        working-directory: contracts
    env:
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-foundry

      - name: Forge fork tests
        run: forge test --match-path 'test/fork/**'

  # Push Convex functions on merge to main so the backend never lags the
  # Vercel frontend deploy. Skipping this is what broke the trader dialog:
  # the frontend shipped calling seatVault/queries:getPublicTraderTier while
  # the deployment never had it. Runs only after checks pass.
  deploy-convex:
    name: Deploy Convex functions
    needs: [checks, vitest, contracts, contracts-static]
    # Only on merge to main, and only when a deploy key is actually configured.
    # Without the secret `npx convex deploy` errors ("No CONVEX_DEPLOYMENT set"),
    # so the job is gated on it rather than painting every main commit red.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - name: Check for deploy key
        id: guard
        run: echo "enabled=${{ env.CONVEX_DEPLOY_KEY != '' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        if: steps.guard.outputs.enabled == 'true'

      - uses: pnpm/action-setup@v6
        if: steps.guard.outputs.enabled == 'true'
        with:
          version: 10.0.0

      - uses: actions/setup-node@v6
        if: steps.guard.outputs.enabled == 'true'
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        if: steps.guard.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      # CONVEX_DEPLOY_KEY targets the deployment associated with the key
      # (formal-pigeon-323). Add it as a repo secret: Settings → Secrets and
      # variables → Actions. Generate with `npx convex dashboard` → Settings,
      # or reuse the key in .env.local.
      - name: Deploy to Convex
        if: steps.guard.outputs.enabled == 'true'
        run: npx convex deploy
