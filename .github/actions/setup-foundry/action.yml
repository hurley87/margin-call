name: Setup Foundry
description: Install the pinned Foundry toolchain and forge dependencies from foundry.deps.json.
runs:
  using: composite
  steps:
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        # Match contracts/REPRODUCIBILITY.md — pin for identical solc/forge across CI machines.
        version: "v1.4.3"

    - name: Install forge dependencies
      shell: bash
      # Shared installer reads contracts/foundry.deps.json (forge-std, OpenZeppelin).
      run: bash "${{ github.workspace }}/scripts/install-forge-deps.sh"
